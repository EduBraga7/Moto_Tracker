<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="login-shell">
        <div class="card login-card">
            <h2>🔒 Acesso Moto Tracker</h2>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <p class="alert">{{ messages[0] }}</p>
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <label class="login-label">Senha:</label>
                <input type="password" name="senha" placeholder="Digite a senha..." required>
                <button type="submit" class="login-submit">ENTRAR</button>
            </form>
        </div>
    </main>

</body>
</html>
