<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editar Manutenção</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1 class="page-title">🔧 Editar manutenção</h1>
        </header>

        <section class="card" style="padding: 16px;">
            <form action="/atualizar_manutencao" method="POST">
                
                <input type="hidden" name="id" value="{{ item.id }}">

                <div class="input-group">
                    <label>Odômetro (KM)</label>
                    <input type="number" step="any" name="km" value="{{ item.km }}" required inputmode="decimal">
                </div>

                <div class="input-group">
                    <label>Serviço / Peça</label>
                    <input type="text" name="servico" value="{{ item.servico }}" required>
                </div>

                <div class="input-group">
                    <label>Valor (R$)</label>
                    <input type="number" step="any" name="valor" value="{{ item.valor }}" required inputmode="decimal">
                </div>

                <div class="input-group">
                    <label>Observação</label>
                    <input type="text" name="obs" value="{{ item.obs }}">
                </div>

                <div class="botoes-editar">
                    <a href="/" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-save">Salvar</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', function() { 
                this.value = this.value.replace(/,/g, '.'); 
            });
        });
    </script>
</body>
</html>
